# Production-style stack for a single VPS or local prod test.
# Usage:
#   cp .env.production.example .env
#   # edit .env with strong secrets and public URLs
#   docker compose -f docker-compose.prod.yml up -d --build
#
# First deploy only:
#   docker compose -f docker-compose.prod.yml run --rm -e SEED_ADMINS=true app true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verifiedvote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-verifiedvote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verifiedvote}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/live')"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-verifiedvote}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-verifiedvote}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      AI_SERVICE_URL: http://ai-service:7860
      RUN_MIGRATIONS: "true"
      SEED_ADMINS: ${SEED_ADMINS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      ai-service:
        condition: service_started

volumes:
  pgdata:
  miniodata:
